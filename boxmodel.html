<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clase 3 y 4 | Modelo de caja | Flexbox</title>
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="css/ejemplos.css">
</head>
<body>
  <main>
    <section>
      <h1>Imágenes</h1>
      <img src="img/001.jpg" alt="Portada de The Shadow #1">
      <img src="img/002.jpg" alt="Portada de The Shadow #2">
      <img src="img/003.jpg" alt="Portada de The Shadow #3">
      <img src="img/004.jpg" alt="Portada de The Shadow #4">
      <img src="img/005.jpg" alt="Portada de The Shadow #5">
      <img src="img/006.jpg" alt="Portada de The Shadow #6">
      <img src="img/007.jpg" alt="Portada de The Shadow #7">
      <img src="img/008.jpg" alt="Portada de The Shadow #8">
    </section>
    <section>
      <h1>Modelo de caja</h1>
      <div class="boxmodel content-box">
        Div 1
      </div>
      <div class="boxmodel border-box">
        Div 2
      </div>
      <ul>
        <li>Link 1</li>
        <li>Link 2</li>
        <li>Link 3</li>
        <li>Link 4</li>
        <li>Link 5</li>
        <li>Link 6</li>
        <li>Link 7</li>
        <li>Link 8</li>
        <li>Link 9</li>
      </ul>
    </section>
    <section>
      <h1>Flexbox</h1>
      <div class="contenedor-flex">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
      </div>
    </section>
    <section id="bienvenida">
      <div class="contenedor-bienvenida">
        <h1>Bienvenidos</h1>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit.</p>
      </div>
    </section>
    <section>
      <h1>Grid</h1>
      <div class="contenedor-grid">
        <div class="item item-1">1</div>
        <div class="item item-2">2</div>
        <div class="item item-3">3</div>
        <div class="item item-4">4</div>
        <div class="item item-5">5</div>
        <div class="item item-6">6</div>
        <div class="item item-7">7</div>
        <div class="item item-8">8</div>
      </div>
    </section>
  </main>
</body>
</html>
